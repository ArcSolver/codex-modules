name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify-matrix:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Codex testbed
        uses: actions/cache@v4
        with:
          path: .work/testbed
          key: ${{ runner.os }}-codex-testbed-${{ hashFiles('codex-versions.toml') }}

      - name: Prepare Codex home
        run: mkdir -p ~/.codex

      - name: Check translation sync (warn only)
        run: bash scripts/check-docs-sync.sh

      - name: Verify module matrix
        run: bash scripts/verify-all.sh -v "min latest"

  docs-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build docs site (sync, build, link-check)
        working-directory: website
        run: npm run build
